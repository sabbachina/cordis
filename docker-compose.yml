version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./data:/data
    environment:
      - PYTHONPATH=/app

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - ./frontend:/app
      - ./data:/data:ro
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
